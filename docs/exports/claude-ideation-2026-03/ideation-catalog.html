<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Ideation Catalog</title></head>
<body>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,system-ui);background:transparent;padding:1rem 0}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0)}
.filter-btn{background:none;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:var(--border-radius-md,8px);padding:5px 14px;font-size:13px;cursor:pointer;color:var(--color-text-secondary,#666);transition:all .15s}
.filter-btn:hover{border-color:var(--color-border-primary,#aaa);color:var(--color-text-primary,#111)}
.filter-btn.active{background:var(--color-background-secondary,#f5f5f5);color:var(--color-text-primary,#111);border-color:var(--color-border-primary,#aaa);font-weight:500}
.card{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e0e0e0);border-radius:var(--border-radius-lg,12px);padding:1.25rem;margin-bottom:10px;transition:border-color .15s}
.card:hover{border-color:var(--color-border-secondary,#ccc)}
.card-header{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.card-meta{flex:1;min-width:200px}
.card-name{font-size:16px;font-weight:500;color:var(--color-text-primary,#111);margin-bottom:4px}
.card-tagline{font-size:13px;color:var(--color-text-secondary,#666);line-height:1.5}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:4px;font-weight:500;letter-spacing:.02em}
.badge-t1{background:#E1F5EE;color:#0F6E56}
.badge-t2{background:#FAEEDA;color:#854F0B}
.badge-t3{background:#FAECE7;color:#993C1D}
.badge-game{background:#EEEDFE;color:#3C3489}
.badge-tool{background:#E6F1FB;color:#0C447C}
.badge-s{background:#EAF3DE;color:#3B6D11}
.badge-m{background:#FAEEDA;color:#854F0B}
.badge-l{background:#FAECE7;color:#993C1D}
.badge-solo{background:#F1EFE8;color:#5F5E5A}
.badge-low{background:#E1F5EE;color:#0F6E56}
.badge-mod{background:#FAEEDA;color:#854F0B}
.toggle-btn{background:none;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:var(--border-radius-md,8px);padding:5px 14px;font-size:12px;cursor:pointer;color:var(--color-text-secondary,#666);white-space:nowrap;margin-top:4px}
.toggle-btn:hover{border-color:var(--color-border-primary,#aaa)}
.details{display:none;margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary,#e0e0e0)}
.details.open{display:block}
.section{margin-bottom:1.25rem}
.section-title{font-size:11px;font-weight:500;color:var(--color-text-tertiary,#999);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.field{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.field-label{font-size:12px;color:var(--color-text-tertiary,#999);min-width:160px;flex-shrink:0;padding-top:1px}
.field-value{font-size:13px;color:var(--color-text-secondary,#555);line-height:1.6;flex:1}
.field-value strong{font-weight:500;color:var(--color-text-primary,#111)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.constraint-box{background:var(--color-background-secondary,#f9f9f9);border-radius:var(--border-radius-md,8px);padding:.75rem;font-size:12px;color:var(--color-text-secondary,#666)}
.constraint-box span{font-weight:500;color:var(--color-text-primary,#111)}
.kill-box{background:#FCEBEB;border-radius:var(--border-radius-md,8px);padding:.75rem;font-size:12px;color:#501313}
.dep-box{background:#FAEEDA;border-radius:var(--border-radius-md,8px);padding:.75rem;font-size:12px;color:#633806}
.tool-box{background:var(--color-background-secondary,#f9f9f9);border-radius:var(--border-radius-md,8px);padding:.75rem}
.tool-row{font-size:12px;margin-bottom:4px;color:var(--color-text-secondary,#555)}
.tool-row:last-child{margin-bottom:0}
.tool-row b{font-weight:500;color:var(--color-text-primary,#111)}
.summary-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;padding:.75rem;background:var(--color-background-secondary,#f9f9f9);border-radius:var(--border-radius-md,8px)}
.stat-item{font-size:12px;color:var(--color-text-secondary,#666)}
.stat-item strong{font-weight:500;color:var(--color-text-primary,#111);display:block;font-size:13px}
.count-banner{font-size:13px;color:var(--color-text-secondary,#666);margin-bottom:1rem}
.count-banner span{font-weight:500;color:var(--color-text-primary,#111)}
@media(max-width:600px){.grid2{grid-template-columns:1fr}.field-label{min-width:120px}}
</style>

<div id="app">
  <div class="filter-bar" id="filters">
    <button class="filter-btn active" data-f="all">All 30</button>
    <button class="filter-btn" data-f="t1">Tier 1 · Beginner</button>
    <button class="filter-btn" data-f="t2">Tier 2 · Intermediate</button>
    <button class="filter-btn" data-f="t3">Tier 3 · Advanced</button>
    <button class="filter-btn" data-f="game">Games only</button>
    <button class="filter-btn" data-f="tool">Tools only</button>
  </div>
  <p class="count-banner" id="count-banner">Showing <span id="visible-count">30</span> of 30 ideas</p>
  <div id="cards"></div>
</div>

<script>
const ideas = [
  {id:1,tier:1,type:'game',name:'Heist Briefing Room',tagline:'Assign roles to a crew before a heist; each combination produces a distinct AI-narrated outcome.',audience:'Narrative gamers, hobbyists',value:'Delivers cause-and-effect satisfaction with zero combat system required.',skillBuild:'Branching state logic, AI narrative prompt design, simple combinatorics.',complexity:'S',techRisk:'AI output varies too wildly across role combos — lock outcome categories first.',scopeCreep:'No heist execution, no character progression, no art assets in v1.',humanCritical:'Crew roster design, role category definitions, outcome tone (gritty vs comedic).',aiAssistable:'Generate crew bios, role-specific outcome paragraphs, flavor text per combo.',first2hr:'Build role assignment UI with 5 static roles and 3 hardcoded outcomes.',weekendMilestone:'Live AI outcome generation for all valid 3-role combos with a share button.',killSwitch:'Users replay 3x and all outcomes feel identical regardless of role choice.',tools:{now:'React + Vite, Claude API, localStorage',later:'Supabase for saved crews, animated outcome reveals',team:'Branching script tooling, narrative design collaborator'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None — text-only, no art required.',exitCriteria:'Outcomes lack meaningful variance; replays feel cosmetic.'},

  {id:2,tier:1,type:'game',name:'The Daily Dispatch',tagline:'Read AI-generated distress signals each day as a base operator and choose how to respond — living with downstream consequences.',audience:'Sci-fi fans, hobbyists, narrative gamers',value:'Daily ritual format with natural replay; decision weight without simulation complexity.',skillBuild:'Prompt chaining for signal variety, daily reset loop, consequence state across sessions.',complexity:'S',techRisk:'AI generating repetitive signal types — needs a signal-category seed system.',scopeCreep:'No persistent world tracking, no resource management, no base map.',humanCritical:'Signal category taxonomy, decision option set, consequence severity calibration.',aiAssistable:'Generate signal content per category, outcome flavor text, weekly arc seeds.',first2hr:'Static signal viewer with 3 choices and a hardcoded consequence screen.',weekendMilestone:'AI-generated signals across 5 categories with 2 distinct endings each.',killSwitch:'Signals feel samey by day 3 with no variety system in place.',tools:{now:'React + Vite, Claude API, localStorage',later:'Supabase for daily seeding, push notifications',team:'Narrative scripter for signal writing'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None.',exitCriteria:'Content fatigue with no signal diversity system — archive if not solvable in v2.'},

  {id:3,tier:1,type:'game',name:'Warrant Board',tagline:'Pick bounties from a procedurally generated job board, weigh risk and reward, and read the outcome narrative.',audience:'RPG fans, tabletop hobbyists, casual strategy gamers',value:'Scratches the bounty hunter power fantasy with no combat system overhead.',skillBuild:'Card UI design, data modeling for risk/reward, probability display.',complexity:'S',techRisk:'Difficulty balance — too swingy and it feels like a lottery, not a game.',scopeCreep:'No combat, no travel, no reputation arc in v1.',humanCritical:'Risk tier design, reward economy, bounty category variety.',aiAssistable:'Generate bounty descriptions, target bios, outcome paragraphs.',first2hr:'6 static bounty cards with accept button and hardcoded success/fail outcomes.',weekendMilestone:'AI-generated bounties with stat-based success rolls and basic bank tracker.',killSwitch:'No meaningful decision weight; all bounties resolve the same regardless of choice.',tools:{now:'React + Vite, Claude API, localStorage',later:'Animated card draws, persistent bounty history',team:'Balance designer for economy tuning'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None.',exitCriteria:'Feels like RNG lottery — no player agency in selection.'},

  {id:4,tier:1,type:'game',name:'Inventory Oracle',tagline:'Given only a character\'s inventory, deduce what happened to them — mystery told entirely through objects.',audience:'Puzzle fans, mystery lovers, narrative gamers',value:'Novel mystery format with zero dialogue or exploration — pure deduction from artifacts.',skillBuild:'Prompt design for constrained mystery generation, reveal UX, difficulty calibration.',complexity:'S',techRisk:'AI generating mysteries with no deducible path — solutions feel arbitrary.',scopeCreep:'No investigation, no NPC dialogue, no room exploration.',humanCritical:'Item pool curation, difficulty tiers, acceptable ambiguity vs solvability.',aiAssistable:'Generate item lists, mystery scenarios, hidden solutions, difficulty metadata.',first2hr:'8-item static inventory with a reveal button and hardcoded solution.',weekendMilestone:'5 AI-generated puzzles rated by difficulty with player accuracy tracking.',killSwitch:'Solutions feel random; players consistently feel cheated on reveal.',tools:{now:'React + Vite, Claude API',later:'Hint system, community puzzle submissions',team:'Puzzle editor for quality control'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None.',exitCriteria:'Solvability rate below 40% OR above 95% — both signal broken calibration.'},

  {id:5,tier:1,type:'game',name:'The Negotiator',tagline:'One-scene negotiation where your word choices shift a tension meter — win, concede, or blow the deal.',audience:'Professionals, gamers, hobbyists interested in persuasion',value:'High replayability via different scenarios; teaches practical negotiation framing.',skillBuild:'Dialogue state machine, sentiment-driven meter logic, AI response chaining.',complexity:'S',techRisk:'AI NPC becomes too cooperative — no resistance, no tension arc.',scopeCreep:'No relationship persistence, no multi-scene arcs, no voice.',humanCritical:'Scenario design, win/loss condition clarity, NPC personality presets.',aiAssistable:'Generate NPC counter-arguments, scenario setups, post-deal debriefs.',first2hr:'One static scenario with 3 choice points and a binary win/loss reveal.',weekendMilestone:'AI-driven NPC responding to free-text player input with live tension meter.',killSwitch:'NPC capitulates too easily; no player skill expression in dialogue choices.',tools:{now:'React + Vite, Claude API',later:'Scenario library, ElevenLabs NPC voice',team:'UX writer for scenario design'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None.',exitCriteria:'NPC behavior unpredictable regardless of player strategy — immersion breaks.'},

  {id:6,tier:1,type:'game',name:'Campfire Stories',tagline:'Alternate sentences with an AI co-author to build a weird or scary story — you control the genre, it controls the twist.',audience:'Writers, creative adults, casual gamers',value:'Low-barrier creative play with shareable output; validates collaborative AI writing.',skillBuild:'Turn-taking state, prompt chaining with context accumulation, text export.',complexity:'S',techRisk:'AI dominating the story and ignoring player direction — needs a stronger leash.',scopeCreep:'No multiplayer in v1, no character tracking, no image generation.',humanCritical:'Genre/tone controls, story length cap, turn structure (equal vs asymmetric).',aiAssistable:'Generate AI turns, suggest story endings, summarize for share card.',first2hr:'Basic alternating input/output UI with one genre tag and no word limit.',weekendMilestone:'3 genre modes, auto-length cap, formatted story export as text file.',killSwitch:'AI consistently derails player narrative direction — player feels irrelevant.',tools:{now:'React + Vite, Claude API',later:'Image generation for scene cards, story sharing link',team:'UX for genre tuning controls'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None.',exitCriteria:'Output quality too inconsistent to share — AI tone shifts mid-story.'},

  {id:7,tier:1,type:'game',name:'Faction Standings',tagline:'Make weekly political decisions as a neutral power-broker and watch faction loyalty meters shift — survive diplomatically.',audience:'Strategy fans, world-building hobbyists',value:'Political cause-and-effect without a map or military sim — pure decision theater.',skillBuild:'Multi-variable state management, animated meter UI, consequence weight design.',complexity:'S',techRisk:'Meter shifts feel arbitrary — no legible connection between decision and outcome.',scopeCreep:'No war system, no faction map, no full event log in v1.',humanCritical:'Faction personality design, decision category balance, win/lose state definition.',aiAssistable:'Generate political events, faction reaction statements, weekly flavor text.',first2hr:'3 factions, 3 resource bars, 3 static decisions with hardcoded meter shifts.',weekendMilestone:'AI-generated events with dynamic meter deltas and a basic game-over condition.',killSwitch:'All decisions lead to similar outcomes — no strategic distinction.',tools:{now:'React + Vite, Claude API, localStorage',later:'Faction history log, visual event timeline',team:'Balance designer for faction math'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None.',exitCriteria:'Meters reach equilibrium in 3 turns with no path to interesting failure.'},

  {id:8,tier:1,type:'tool',name:'Prompt Forge',tagline:'Input a prompt, run it against your own rubric, rate the output, and save top performers for reuse.',audience:'AI builders, creators, professionals doing content work',value:'Systematic prompt improvement over trial and error — builds a personal prompt library.',skillBuild:'Form design, comparison UI layout, manual scoring system, localStorage persistence.',complexity:'S',techRisk:'Rubric design is subjective — hard to make grading feel systematic without effort.',scopeCreep:'No team sharing, no version history, no automated scoring in v1.',humanCritical:'Rubric category design, what counts as a passing output, tagging taxonomy.',aiAssistable:'Generate prompt variations from a base, suggest rubric criteria, flag weak outputs.',first2hr:'Text input + Claude output display + manual 1–5 rating with save button.',weekendMilestone:'Compare 3 prompt variants side by side with saved ratings and tag filter.',killSwitch:'Faster to iterate directly in Claude — the tool adds friction instead of removing it.',tools:{now:'React + Vite, Claude API, localStorage',later:'Export to JSON, import/share prompts, version diff',team:'Collaborative prompt library tooling'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None.',exitCriteria:'No measurable improvement signal from using it vs free-form chat.'},

  {id:9,tier:1,type:'game',name:'Tavern Ledger',tagline:'Run a fantasy tavern day-by-day — hire staff, price drinks, survive the week financially without going bankrupt.',audience:'Idle game fans, cozy sim players, casual hobbyists',value:'Satisfying management loop in a minimal package; no combat, no complex narrative required.',skillBuild:'Day/cycle loop design, simple resource economy, event weighting system.',complexity:'S',techRisk:'Economy balance — death spiral on day 2 or zero tension if numbers always work.',scopeCreep:'No story, no quest givers, no graphics beyond emoji/icons.',humanCritical:'Economy formula, event pool design, win condition (days survived vs score).',aiAssistable:'Generate nightly event flavor, patron descriptions, seasonal drink names.',first2hr:'Day loop UI with drink prices, income formula, and basic end-of-day summary.',weekendMilestone:'7-day cycle with 3 random events per night and simple staff hire system.',killSwitch:'Economy untunable within 2 hours of effort — game never finds a fun range.',tools:{now:'React + Vite, localStorage',later:'Claude API for event flavor, animated coin transitions',team:'Economy spreadsheet designer'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None.',exitCriteria:'No tension in daily decisions — pure idle with no meaningful tradeoffs.'},

  {id:10,tier:1,type:'game',name:'The Briefing',tagline:'Read a mission briefing, spend exactly 3 questions asking your AI handler for intel, then commit to a plan.',audience:'Spy/thriller fans, strategy gamers, puzzle players',value:'Captures espionage tension in a tiny contained format — limited questions make every one count.',skillBuild:'Chat-style UI, limited-resource mechanic design, AI context injection.',complexity:'S',techRisk:'AI handler giving inconsistent intel that breaks the mission logic.',scopeCreep:'No mission execution simulation, no outcome branching by plan in v1.',humanCritical:'Mission template variety, question limit UX, how the plan maps to outcomes.',aiAssistable:'Generate handler responses, mission scenarios, post-plan outcome narratives.',first2hr:'Static mission card + 3 question input slots + hardcoded outcome screen.',weekendMilestone:'AI handler answering 3 free-text questions; outcome adapts to the stated plan.',killSwitch:'Questions have no effect on outcome — cosmetic intel loop with no decision weight.',tools:{now:'React + Vite, Claude API',later:'Mission randomizer, branching outcome trees',team:'Narrative designer for mission variety'},constraints:{mode:'solo',budget:'none',skill:'beginner',firstTest:'2 hrs'},dependencies:'None.',exitCriteria:'Handler intel makes every mission trivially obvious — no planning required.'},

  {id:11,tier:2,type:'game',name:'The Correspondent',tagline:'Play a journalist receiving AI-generated tips; investigate, verify, publish — your reputation tracks accuracy vs speed.',audience:'Puzzle fans, professionals, narrative gamers',value:'Novel epistemic responsibility mechanic — rare in games; high professional resonance.',skillBuild:'Multi-source state tracking, reputation decay system, AI investigative content pipeline.',complexity:'M',techRisk:'AI-generated false tips need to be plausibly wrong but detectable — hard to calibrate.',scopeCreep:'No newsroom management, no staff, no full story arc in v1.',humanCritical:'Tip category design, verification mechanic depth, reputation formula.',aiAssistable:'Generate tips, supporting documents, source reliability metadata, background lore.',first2hr:'3 static tips with verify/publish choices and a binary accuracy outcome.',weekendMilestone:'10 AI tips across 2 story arcs with a reputation meter and end-of-edition score.',killSwitch:'Verification mechanic feels arbitrary — no real deduction, just guessing.',tools:{now:'React + Vite, Claude API, localStorage',later:'Supabase for persistent newsroom history',team:'Editorial game designer for arc scripting'},constraints:{mode:'solo',budget:'low',skill:'intermediate',firstTest:'4 hrs'},dependencies:'None.',exitCriteria:'No meaningful difference between careful investigation and random publishing.'},

  {id:12,tier:2,type:'game',name:'Cult of One',tagline:'Manage a growing organization by balancing belief, defection, and recruitment — survive as your followers evolve.',audience:'Strategy fans, dark comedy fans, management sim lovers',value:'Social dynamics as resource management; high variance and morally charged decisions.',skillBuild:'Multi-variable state system, AI persona generation for members, weekly event loop.',complexity:'M',techRisk:'Member AI personas drifting into inconsistency across sessions.',scopeCreep:'Aggregate decisions only — no direct member dialogue, no graphics in v1.',humanCritical:'Org type (cult vs guild vs corp), belief/defection balance, win condition design.',aiAssistable:'Generate member defection events, recruitment pitches, doctrine-shift flavor.',first2hr:'5 member cards, 3 resource bars, a weekly decision loop — all static.',weekendMilestone:'10-member org with AI-generated weekly events and a collapse-or-thrive end state.',killSwitch:'Resource management feels like a spreadsheet — no emotional stakes in decisions.',tools:{now:'React + Vite, Claude API, localStorage',later:'Supabase for org history, member relationship graphs',team:'Systems designer for belief economy'},constraints:{mode:'solo',budget:'low',skill:'intermediate',firstTest:'4 hrs'},dependencies:'None.',exitCriteria:'Members feel like numbers — no behavioral differentiation across types.'},

  {id:13,tier:2,type:'game',name:'The Quartermaster',tagline:'Supply a fantasy army on the march — allocate scarce resources across competing departments before each battle.',audience:'Strategy fans, tabletop gamers, puzzle players',value:'Tactical planning tension without combat complexity; scarce resources create hard tradeoffs.',skillBuild:'Constraint optimization UI, multi-department resource allocation, probability outcome display.',complexity:'M',techRisk:'Outcome variance must reward strategy — bad luck should never fully negate good planning.',scopeCreep:'Supply chain only — no battle simulation, no army map, no commander dialogues.',humanCritical:'Resource category design, department priority logic, campaign length.',aiAssistable:'Generate march event flavor, commander complaint messages, supply shortage news.',first2hr:'3 departments, 3 resource types, a static battle outcome based on allocation.',weekendMilestone:'5-march campaign with AI event generation, score tracking, and final battle reveal.',killSwitch:'No clear strategic depth — all allocation combinations feel equivalent.',tools:{now:'React + Vite, Claude API, localStorage',later:'Visual campaign map, persistent run history',team:'Balance designer for allocation math'},constraints:{mode:'solo',budget:'low',skill:'intermediate',firstTest:'4 hrs'},dependencies:'None.',exitCriteria:'Allocation decisions require no skill — optimal strategy is immediately obvious.'},

  {id:14,tier:2,type:'game',name:'Time Loop Inbox',tagline:'Start the same workday repeatedly — your inbox shifts each loop based on what you discovered last time — escape by cracking the pattern.',audience:'Puzzle fans, narrative gamers, mystery lovers',value:'Email as a game board is genuinely underused; loop structure creates high intrinsic motivation.',skillBuild:'Loop state persistence, conditional AI content generation, clue distribution design.',complexity:'M',techRisk:'AI email inconsistency across loops breaks puzzle logic — clues must be deterministic.',scopeCreep:'Text-only in v1 — no NPCs outside email, no office exploration.',humanCritical:'Loop exit conditions, clue distribution plan across loops, red herring balance.',aiAssistable:'Generate flavor email threads, side-conversation content, subtle clue variations.',first2hr:'3-email static inbox, loop reset button, basic loop counter state.',weekendMilestone:'3-loop puzzle with AI-generated supporting emails and 1 deterministic clue per loop.',killSwitch:'Puzzle unsolvable without external hints — clue logic collapses in AI generation.',tools:{now:'React + Vite, Claude API, localStorage',later:'Supabase for puzzle state, hint system',team:'Puzzle designer for clue architecture'},constraints:{mode:'solo',budget:'low',skill:'intermediate',firstTest:'6 hrs'},dependencies:'None.',exitCriteria:'Puzzle logic breaks — no reliable path from clues to solution.'},

  {id:15,tier:2,type:'game',name:'Incident Review Board',tagline:'Review AI-generated incident reports as a board member — vote on blame, exoneration, or escalation and live with consequences.',audience:'Professionals, narrative gamers, dark comedy fans',value:'Satirizes bureaucracy with genuine replay variance; consequence tracking adds strategic weight.',skillBuild:'Voting/verdict mechanic, AI incident generation with ambiguity design, consequence tracking.',complexity:'M',techRisk:'Incidents need enough ambiguity to support multiple valid verdicts — hard to calibrate.',scopeCreep:'No real-time deliberation, no AI boardmembers with opinions in v1.',humanCritical:'Verdict category design, consequence severity, tone calibration (satire vs serious).',aiAssistable:'Generate incident reports, supporting evidence, downstream consequence paragraphs.',first2hr:'1 static incident with 3 verdict buttons and a hardcoded consequence reveal.',weekendMilestone:'5 AI incidents with branching consequence chains and a cumulative score.',killSwitch:'Outcomes feel arbitrary regardless of verdict — no consequential logic visible.',tools:{now:'React + Vite, Claude API',later:'AI boardmember personas, multi-case run mode',team:'Narrative game designer for consequence scripting'},constraints:{mode:'solo',budget:'low',skill:'intermediate',firstTest:'4 hrs'},dependencies:'None.',exitCriteria:'Tone mismatch — too dark or too silly; users disengage after first case.'},

  {id:16,tier:2,type:'game',name:'Galactic Dispatch',tagline:'Space delivery driver: choose routes, manage fuel and cargo, and navigate random events across a procedural trade network.',audience:'Casual strategy fans, sci-fi hobbyists, retro game fans',value:'Classic travel + resource loop in a minimal package — proven fun, underbuilt in mobile.',skillBuild:'Node-based map UI in SVG, route state machine, probability-weighted event system.',complexity:'M',techRisk:'Map generation creating unwinnable routes — needs solvability guarantee.',scopeCreep:'No combat, no faction politics — delivery and event loop only.',humanCritical:'Route network design, event probability weights, cargo economy balance.',aiAssistable:'Generate station descriptions, event flavor text, cargo lore, hazard narratives.',first2hr:'5-node static SVG map with 3 routes, a fuel counter, and click-to-travel.',weekendMilestone:'10-node map with AI event generation and a 3-delivery run with final score.',killSwitch:'Route choices feel meaningless — no interesting tradeoffs in path selection.',tools:{now:'React + Vite, SVG map, Claude API, localStorage',later:'Animated ship movement, procedural map generator',team:'Level designer for route balance'},constraints:{mode:'solo',budget:'low',skill:'intermediate',firstTest:'6 hrs'},dependencies:'None (SVG map is buildable without art assets).',exitCriteria:'Events feel punishing with no mitigation options — pure luck with no agency.'},

  {id:17,tier:2,type:'tool',name:'Lore Atlas',tagline:'Build a fictional world entry-by-entry while an AI consistency checker flags contradictions and suggests connections.',audience:'Writers, worldbuilders, tabletop game designers',value:'Solves the #1 worldbuilding pain: internal inconsistency across a growing doc set.',skillBuild:'Document graph logic, AI contradiction detection prompt design, search/filter UI.',complexity:'M',techRisk:'AI flagging false-positive contradictions frustrates users and erodes trust.',scopeCreep:'No collaboration features, no export to game engine formats in v1.',humanCritical:'Entry taxonomy design, contradiction severity levels, conflict resolution UX.',aiAssistable:'Consistency checks on new entries, connection suggestions, tag recommendations.',first2hr:'Entry form + tag system + flat list display with basic search.',weekendMilestone:'10-entry atlas with AI consistency check triggered on each new submission.',killSwitch:'AI generates too many false contradiction alerts — workflow slower than a Google Doc.',tools:{now:'React + Vite, Claude API, localStorage',later:'Supabase, D3 relationship graph, export to Markdown',team:'UX designer for conflict resolution flows'},constraints:{mode:'solo',budget:'low',skill:'intermediate',firstTest:'4 hrs'},dependencies:'None.',exitCriteria:'Consistency engine adds noise not signal — lore feels more chaotic with it than without.'},

  {id:18,tier:2,type:'game',name:'Murder at the Manor',tagline:'Procedural murder mystery — interview AI-driven suspects, gather physical clues, and accuse the killer.',audience:'Mystery fans, puzzle gamers, tabletop RPG players',value:'Classic format with genuine replay via AI suspect generation — infinite case variety.',skillBuild:'Multi-NPC state management, clue graph design, accusation logic and feedback system.',complexity:'M',techRisk:'AI suspects contradicting each other in game-breaking ways — needs a locked fact sheet.',scopeCreep:'No room exploration, no animation — text + placeholder portrait only.',humanCritical:'Clue graph design, suspect alibi structure, killer-selection guarantee per run.',aiAssistable:'Generate suspect personas, testimony variations, red herring clue sets.',first2hr:'3 static suspects with pre-written testimony and an accusation button.',weekendMilestone:'AI-generated mystery with 4 suspects, 1 guaranteed killer, consistent core clue set.',killSwitch:'AI mysteries unsolvable OR trivially obvious — no solvability sweet spot.',tools:{now:'React + Vite, Claude API, localStorage',later:'Portrait generation, evidence board visual, Supabase for run history',team:'Narrative designer for clue architecture'},constraints:{mode:'solo',budget:'low',skill:'intermediate',firstTest:'6 hrs'},dependencies:'Character portraits (can use initials/text avatars to start).',exitCriteria:'Mystery logic collapses across AI variations — players feel cheated consistently.'},

const tierColors = {1:'t1',2:'t2',3:'t3'};
const tierLabels = {1:'Tier 1 · Beginner',2:'Tier 2 · Intermediate',3:'Tier 3 · Advanced'};
const complexityLabel = {S:'Small',M:'Medium',L:'Large'};
const budgetLabel = {'none':'None','low':'Low','low-moderate':'Low–Moderate','moderate':'Moderate'};

function renderCard(idea){
  const tc = tierColors[idea.tier];
  const cc = idea.complexity==='S'?'s':idea.complexity==='M'?'m':'l';
  const budgetClass = idea.constraints.budget.includes('moderate')?'mod':idea.constraints.budget==='low'?'low':'';
  return `
<div class="card" data-tier="${idea.tier}" data-type="${idea.type}" id="card-${idea.id}">
  <div class="card-header">
    <div style="min-width:28px;height:28px;border-radius:50%;background:var(--color-background-secondary,#f5f5f5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--color-text-secondary,#666);flex-shrink:0;margin-top:2px">${idea.id}</div>
    <div class="card-meta">
      <div class="card-name">${idea.name}</div>
      <div class="card-tagline">${idea.tagline}</div>
      <div class="badges">
        <span class="badge badge-${tc}">${tierLabels[idea.tier]}</span>
        <span class="badge badge-${idea.type}">${idea.type==='game'?'Game':'Tool'}</span>
        <span class="badge badge-${cc}">Complexity: ${complexityLabel[idea.complexity]}</span>
        <span class="badge badge-solo">${idea.constraints.mode}</span>
        ${idea.constraints.budget!=='none'?`<span class="badge" style="background:var(--color-background-secondary,#f5f5f5);color:var(--color-text-secondary,#666)">Budget: ${budgetLabel[idea.constraints.budget]}</span>`:''}
      </div>
    </div>
    <button class="toggle-btn" onclick="toggleCard(${idea.id})">+ Details</button>
  </div>
  <div class="details" id="details-${idea.id}">
    <div class="summary-row">
      <div class="stat-item"><strong>${idea.audience}</strong>Audience</div>
      <div class="stat-item" style="border-left:0.5px solid var(--color-border-tertiary,#e0e0e0);padding-left:12px"><strong>${idea.constraints.firstTest}</strong>To first test</div>
      <div class="stat-item" style="border-left:0.5px solid var(--color-border-tertiary,#e0e0e0);padding-left:12px"><strong>${idea.constraints.skill}</strong>Skill level</div>
    </div>
    <div class="section">
      <div class="section-title">Core value</div>
      <div class="field"><div class="field-label">Why it matters</div><div class="field-value">${idea.value}</div></div>
      <div class="field"><div class="field-label">Skill-building value</div><div class="field-value">${idea.skillBuild}</div></div>
    </div>
    <div class="section">
      <div class="section-title">Risk & scope</div>
      <div class="field"><div class="field-label">Main technical risk</div><div class="field-value">${idea.techRisk}</div></div>
      <div class="field"><div class="field-label">Scope-creep warning</div><div class="field-value" style="color:var(--color-text-danger,#a32d2d)">${idea.scopeCreep}</div></div>
    </div>
    <div class="section">
      <div class="section-title">Build plan</div>
      <div class="field"><div class="field-label">Human-critical decisions</div><div class="field-value">${idea.humanCritical}</div></div>
      <div class="field"><div class="field-label">AI-assistable tasks</div><div class="field-value">${idea.aiAssistable}</div></div>
      <div class="field"><div class="field-label">First 2-hour task</div><div class="field-value"><strong>${idea.first2hr}</strong></div></div>
      <div class="field"><div class="field-label">First weekend milestone</div><div class="field-value"><strong>${idea.weekendMilestone}</strong></div></div>
    </div>
    <div class="grid2">
      <div>
        <div class="kill-box"><div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Kill-switch criteria</div>${idea.killSwitch}</div>
      </div>
      <div>
        <div class="dep-box"><div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Dependency check</div>${idea.dependencies}</div>
      </div>
    </div>
    <div class="section" style="margin-top:1rem">
      <div class="section-title">Tool lane</div>
      <div class="tool-box">
        <div class="tool-row"><b>Now:</b> ${idea.tools.now}</div>
        <div class="tool-row"><b>Later:</b> ${idea.tools.later}</div>
        <div class="tool-row"><b>Team-scale:</b> ${idea.tools.team}</div>
      </div>
    </div>
    <div class="kill-box" style="background:#FCEBEB;margin-top:.75rem"><div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Exit criteria — archive if:</div>${idea.exitCriteria}</div>
  </div>
</div>`;
}

function toggleCard(id){
  const d = document.getElementById('details-'+id);
  const btn = d.previousElementSibling.querySelector('.toggle-btn');
  if(d.classList.contains('open')){d.classList.remove('open');btn.textContent='+ Details';}
  else{d.classList.add('open');btn.textContent='− Close';}
}

function applyFilter(f){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-f="'+f+'"]').classList.add('active');
  let count=0;
  document.querySelectorAll('.card').forEach(card=>{
    const tier=card.dataset.tier;
    const type=card.dataset.type;
    let show=false;
    if(f==='all')show=true;
    else if(f==='t1'&&tier==='1')show=true;
    else if(f==='t2'&&tier==='2')show=true;
    else if(f==='t3'&&tier==='3')show=true;
    else if(f==='game'&&type==='game')show=true;
    else if(f==='tool'&&type==='tool')show=true;
    card.style.display=show?'block':'none';
    if(show)count++;
  });
  document.getElementById('visible-count').textContent=count;
}

const cardsHTML = ideas.map(renderCard).join('');
document.getElementById('cards').innerHTML = cardsHTML;

document.getElementById('filters').addEventListener('click',e=>{
  if(e.target.dataset.f) applyFilter(e.target.dataset.f);
});
</script>
</body>
</html>
